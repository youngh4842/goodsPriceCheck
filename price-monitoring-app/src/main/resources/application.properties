spring.application.name=goods-price
spring.profiles.active=dev

spring.datasource.url=jdbc:h2:mem:goods_price;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

crawler.hsmoa.base-url=https://hsmoa.com
crawler.source=HSMOA
crawler.mock-mall.base-url=http://localhost:8090
crawler.headless=true
crawler.timeout-ms=10000
crawler.allow-direct-search-fallback=true
crawler.max-results=0

logging.level.com.example.goodsprice=INFO
